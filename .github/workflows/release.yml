name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to publish, for example v0.1.1"
                required: true
                type: string

env:
    RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
    contents: write

jobs:
    build-desktop:
        name: Build desktop release packages
        uses: ./.github/workflows/desktop-build.yml
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            version: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            artifact-prefix: release-archive

    build-userscript:
        name: Build userscript release asset
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ env.RELEASE_TAG }}

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Build userscript
              run: |
                  npm ci
                  npm run build:userscript

            - name: Rename userscript asset
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  cp userscripts/shuaforge-question-exporter.user.js "dist/ShuaForge-Question-Exporter-${RELEASE_TAG}.user.js"

            - name: Upload userscript asset
              uses: actions/upload-artifact@v4
              with:
                  name: release-userscript
                  path: dist/ShuaForge-Question-Exporter-${{ env.RELEASE_TAG }}.user.js
                  if-no-files-found: error

    publish:
        name: Publish GitHub Release
        runs-on: ubuntu-latest
        needs:
            - build-desktop
            - build-userscript
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ env.RELEASE_TAG }}

            - name: Download release archives
              uses: actions/download-artifact@v4
              with:
                  pattern: release-archive-*
                  path: release-assets

            - name: Download userscript asset
              uses: actions/download-artifact@v4
              with:
                  name: release-userscript
                  path: release-assets/release-userscript

            - name: List release assets
              run: find release-assets -maxdepth 3 -type f -print

            - name: Generate Release Notes
              id: generate_notes
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  result-encoding: string
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const tag = process.env.RELEASE_TAG;
                      const releasesResp = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
                      const releases = releasesResp.data;
                      const tags = releases.map(r => r.tag_name);
                      const idx = tags.indexOf(tag);
                      const prev = idx < releases.length - 1 ? releases[idx + 1] : null;
                      const prevTag = prev ? prev.tag_name : null;
                      const compareUrl = prevTag ? `https://github.com/${owner}/${repo}/compare/${prevTag}...${tag}` : '';

                      const closedStart = prev ? new Date(prev.published_at).toISOString() : null;
                      const closedEnd = new Date().toISOString();

                      let query = `repo:${owner}/${repo} is:issue is:closed reason:completed`;
                      if (closedStart) {
                        query += ` closed:${closedStart}..${closedEnd}`;
                      }

                      const issues = await github.paginate(github.rest.search.issuesAndPullRequests, {
                        q: query,
                        per_page: 100
                      });

                      const negativeLabels = ['wontfix', 'duplicate', 'invalid'];
                      const groups = { Fix: [], Update: [], Feature: [] };
                      const seen = new Set();

                      for (const item of issues) {
                        if (seen.has(item.number)) continue;
                        seen.add(item.number);

                        const labels = (item.labels || []).map(l => typeof l === 'string' ? l : l.name);
                        const labelLowers = labels.map(l => String(l).toLowerCase());

                        if (labelLowers.some(l => negativeLabels.includes(l))) continue;
                        if (labelLowers.includes('question')) continue;

                        if (labelLowers.includes('bug')) {
                          groups.Fix.push(item);
                          continue;
                        }

                        if (labelLowers.some(l => ['enhancement', 'feature'].includes(l))) {
                          groups.Feature.push(item);
                          continue;
                        }

                        if (labelLowers.some(l => ['documentation', 'doc', 'update'].includes(l))) {
                          groups.Update.push(item);
                        }
                      }

                      let body = "# What's Changed\n\n";
                      const zh = { Fix: '修复', Update: '更新', Feature: '新增' };
                      for (const key of ['Fix', 'Update', 'Feature']) {
                        if (groups[key].length) {
                          body += `## ${key}\n\n`;
                          for (const i of groups[key]) {
                            body += `- ${zh[key]}：[#${i.number}](${i.html_url}) ${i.title}\n`;
                          }
                          body += "\n";
                        }
                      }
                      if (compareUrl) {
                        body += `**Full Changelog**: ${compareUrl}\n`;
                      }
                      return body;

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  name: ShuaForge ${{ env.RELEASE_TAG }}
                  body: ${{ steps.generate_notes.outputs.result }}
                  files: |
                      release-assets/release-archive-*/ShuaForge-*
                      release-assets/release-userscript/*.user.js
